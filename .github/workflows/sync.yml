name: Wahoo to Garmin Sync

on:
  schedule:
    # 每十五分钟运行一次（避免Garmin IP限流，节省Actions免费额度）
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # 支持手动触发

env:
  PYTHON_VERSION: '3.11'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    # 恢复上次同步状态（去重用）
    # v4 artifact 无法跨 run 下载，改用 cache 持久化 sync_state.json
    - name: Restore sync state
      uses: actions/cache@v4
      with:
        path: sync_state.json
        key: sync-state
        # 每次都命中旧缓存（restore-keys 兜底），写回时更新
        restore-keys: |
          sync-state
        
    - name: Run sync script
      env:
        GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
        GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
        DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
        DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
        # 非敏感配置用 variables，回退到默认值
        DROPBOX_FOLDER: ${{ vars.DROPBOX_FOLDER || '/Apps/Wahoo Fitness' }}
        GARMIN_REGION: ${{ vars.GARMIN_REGION || 'international' }}
      run: |
        python sync.py
        
    - name: Save sync state
      uses: actions/cache@v4
      if: always()
      with:
        path: sync_state.json
        key: sync-state
