name: Wahoo to Garmin Sync

on:
  schedule:
    # 每小时运行一次（避免Garmin IP限流，节省Actions免费额度）
    - cron: '0 * * * *'
  workflow_dispatch:
    # 支持手动触发

env:
  PYTHON_VERSION: '3.11'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    # 恢复上次同步状态（去重用）
    - name: Download previous sync state
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: sync-state
        path: .
        
    - name: Run sync script
      env:
        GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
        GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
        DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
        DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
        DROPBOX_FOLDER: ${{ secrets.DROPBOX_FOLDER }}
        GARMIN_REGION: ${{ secrets.GARMIN_REGION }}
      run: |
        python sync.py
        
    - name: Save processed files tracking
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: sync-state
        path: sync_state.json
        retention-days: 90
